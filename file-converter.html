<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件格式转换工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }

        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        input[type="file"] {
            display: none;
        }

        .file-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .format-selector {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .convert-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            display: none;
        }

        .convert-btn.show {
            display: block;
        }

        .convert-btn:hover {
            transform: translateY(-2px);
        }

        .convert-btn:active {
            transform: translateY(0);
        }

        .convert-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
        }

        .download-btn {
            margin-top: 15px;
            padding: 12px 24px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        .download-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 文件格式转换工具</h1>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📤</div>
            <p>点击或拖拽文件到这里</p>
            <p style="font-size: 14px; color: #999; margin-top: 10px;">支持图片、文档、文本等多种格式</p>
        </div>

        <input type="file" id="fileInput" accept="*/*">

        <div class="file-info" id="fileInfo">
            <strong>已选择文件：</strong>
            <p id="fileName"></p>
            <p id="fileSize"></p>
        </div>

        <div class="format-selector">
            <label for="targetFormat">转换为：</label>
            <select id="targetFormat">
                <option value="">-- 请选择目标格式 --</option>
                <optgroup label="图片格式">
                    <option value="png">PNG</option>
                    <option value="jpg">JPG/JPEG</option>
                    <option value="webp">WebP</option>
                    <option value="gif">GIF</option>
                    <option value="bmp">BMP</option>
                </optgroup>
                <optgroup label="文档格式">
                    <option value="txt">TXT (纯文本)</option>
                    <option value="md">Markdown</option>
                    <option value="html">HTML</option>
                    <option value="json">JSON</option>
                    <option value="csv">CSV</option>
                </optgroup>
                <optgroup label="其他">
                    <option value="base64">Base64编码</option>
                </optgroup>
            </select>
        </div>

        <button class="convert-btn" id="convertBtn">开始转换</button>

        <div class="result" id="result"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const targetFormat = document.getElementById('targetFormat');
        const convertBtn = document.getElementById('convertBtn');
        const result = document.getElementById('result');

        let selectedFile = null;

        // 点击上传区域
        uploadArea.addEventListener('click', () => fileInput.click());

        // 文件选择
        fileInput.addEventListener('change', handleFileSelect);

        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                selectedFile = files[0];
                displayFileInfo();
            }
        });

        function handleFileSelect(e) {
            selectedFile = e.target.files[0];
            displayFileInfo();
        }

        function displayFileInfo() {
            if (selectedFile) {
                fileName.textContent = selectedFile.name;
                fileSize.textContent = `大小: ${formatFileSize(selectedFile.size)}`;
                fileInfo.classList.add('show');
                convertBtn.classList.add('show');
                result.classList.remove('show');
            }
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        // 转换按钮
        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                showResult('请先选择文件', 'error');
                return;
            }

            if (!targetFormat.value) {
                showResult('请选择目标格式', 'error');
                return;
            }

            convertBtn.disabled = true;
            convertBtn.textContent = '转换中...';

            try {
                await convertFile(selectedFile, targetFormat.value);
            } catch (error) {
                showResult('转换失败: ' + error.message, 'error');
            } finally {
                convertBtn.disabled = false;
                convertBtn.textContent = '开始转换';
            }
        });

        async function convertFile(file, format) {
            const fileType = file.type;

            // 图片转换
            if (fileType.startsWith('image/') && ['png', 'jpg', 'webp', 'gif', 'bmp'].includes(format)) {
                await convertImage(file, format);
            }
            // 文本转换
            else if (fileType.startsWith('text/') || format === 'txt' || format === 'md' || format === 'html') {
                await convertText(file, format);
            }
            // Base64编码
            else if (format === 'base64') {
                await convertToBase64(file);
            }
            // JSON/CSV
            else if (format === 'json' || format === 'csv') {
                await convertData(file, format);
            }
            else {
                throw new Error('不支持的转换类型');
            }
        }

        async function convertImage(file, format) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);

                        const mimeType = format === 'jpg' ? 'image/jpeg' : `image/${format}`;
                        canvas.toBlob((blob) => {
                            downloadFile(blob, `converted.${format}`);
                            showResult('转换成功！', 'success', true);
                            resolve();
                        }, mimeType, 0.95);
                    };
                    img.onerror = () => reject(new Error('图片加载失败'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('文件读取失败'));
                reader.readAsDataURL(file);
            });
        }

        async function convertText(file, format) {
            const text = await file.text();
            let content = text;
            let extension = format;

            if (format === 'html') {
                content = `<!DOCTYPE html>\n<html>\n<head>\n<meta charset="UTF-8">\n<title>Converted</title>\n</head>\n<body>\n<pre>${escapeHtml(text)}</pre>\n</body>\n</html>`;
            } else if (format === 'md') {
                content = `# Converted Document\n\n${text}`;
            }

            const blob = new Blob([content], { type: 'text/plain' });
            downloadFile(blob, `converted.${extension}`);
            showResult('转换成功！', 'success', true);
        }

        async function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const base64 = e.target.result.split(',')[1];
                    const blob = new Blob([base64], { type: 'text/plain' });
                    downloadFile(blob, 'converted.base64.txt');
                    showResult('转换成功！', 'success', true);
                    resolve();
                };
                reader.onerror = () => reject(new Error('文件读取失败'));
                reader.readAsDataURL(file);
            });
        }

        async function convertData(file, format) {
            const text = await file.text();

            try {
                if (format === 'json') {
                    // 尝试解析CSV转JSON
                    const lines = text.split('\n').filter(line => line.trim());
                    const headers = lines[0].split(',').map(h => h.trim());
                    const data = lines.slice(1).map(line => {
                        const values = line.split(',');
                        const obj = {};
                        headers.forEach((header, i) => {
                            obj[header] = values[i]?.trim() || '';
                        });
                        return obj;
                    });
                    const json = JSON.stringify(data, null, 2);
                    const blob = new Blob([json], { type: 'application/json' });
                    downloadFile(blob, 'converted.json');
                } else if (format === 'csv') {
                    // 尝试解析JSON转CSV
                    const data = JSON.parse(text);
                    if (Array.isArray(data) && data.length > 0) {
                        const headers = Object.keys(data[0]);
                        const csv = [
                            headers.join(','),
                            ...data.map(row => headers.map(h => row[h] || '').join(','))
                        ].join('\n');
                        const blob = new Blob([csv], { type: 'text/csv' });
                        downloadFile(blob, 'converted.csv');
                    } else {
                        throw new Error('JSON格式不正确');
                    }
                }
                showResult('转换成功！', 'success', true);
            } catch (error) {
                throw new Error('数据格式解析失败');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function downloadFile(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function showResult(message, type, showDownload = false) {
            result.textContent = message;
            result.className = `result show ${type}`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医院就诊挂号系统 - 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .card-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .card h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .card p {
            color: #666;
            font-size: 16px;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #764ba2;
        }

        .btn-secondary:hover {
            background: #653a8a;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
            font-size: 14px;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            margin-top: 20px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #28a745;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }

            .cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 医院就诊挂号系统</h1>
            <p>智能排队 · 实时通知 · 便捷就医</p>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">检查服务器连接...</span>
            </div>
        </div>

        <div class="cards">
            <div class="card" onclick="location.href='patient.html'">
                <div class="card-icon">👤</div>
                <h2>患者端</h2>
                <p>在线挂号，实时查看排队状态，接收就诊通知</p>
                <a href="patient.html" class="btn">进入患者端</a>
            </div>

            <div class="card" onclick="location.href='hospital.html'">
                <div class="card-icon">🏥</div>
                <h2>医院端</h2>
                <p>管理挂号队列，叫号就诊，统计数据分析</p>
                <a href="hospital.html" class="btn btn-secondary">进入医院端</a>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 医院就诊挂号系统 | 基于 WebSocket 实时通信技术</p>
        </div>
    </div>

    <script>
        // 检查服务器连接
        function checkServerConnection() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;

            const ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                document.getElementById('statusText').textContent = '服务器已连接';
                document.getElementById('statusDot').style.background = '#28a745';
                ws.close();
            };

            ws.onerror = function() {
                document.getElementById('statusText').textContent = '服务器连接失败';
                document.getElementById('statusDot').style.background = '#dc3545';
                document.getElementById('statusDot').style.animation = 'none';
            };
        }

        // 页面加载时检查连接
        window.addEventListener('load', checkServerConnection);
    </script>
</body>
</html>
